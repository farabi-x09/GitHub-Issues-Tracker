<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker </title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- style font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awes -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind and daistUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="style.css">

</head>
<body class="bg-base-200">
    <!-- navbar -->
     <div class="bg-white ">

    <div class="navbar flex sm:justify-between justify-center flex-wrap   mt-2 w-11/12 mx-auto space-y-5 items-stretch gap-2">

  <div class=" flex items-center gap-2 h-full">
    <img class="w-10" src="./assets/github-logo.png" alt="">
    <p class="text-2xl sm:text-3xl font-semibold">GitHub Issues Tracker</p>
  </div>
  <div class="flex gap-5 ">
    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
    <button class="btn btn-primary hover:bg-success">+ New Issue</button>
  </div>
</div>
</div>

<!-- menu -->
<div class="bg-white mt-5 w-10/12 mx-auto rounded-lg flex justify-center sm:justify-start">
     <ul class="menu menu-horizontal space-x-2  ">
  <li><button class="btn">All</button></li>
  <li><button class="btn">Open</button></li>
  <li><button class="btn">Closed</button></li>
</ul>
</div>

<div>
    <p>hi</p>
</div>
