<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker </title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- style font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awes -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind and daistUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="style.css">

</head>
<body class="bg-base-200 max-w-[2000px] mx-auto">
    <!-- navbar -->
     <div class="bg-white ">

    <div class="navbar flex sm:justify-between justify-center flex-wrap   mt-2 w-11/12 mx-auto space-y-5 items-stretch gap-2">

  <div class=" flex items-center gap-2 h-full">
    <img class="w-10" src="./assets/github-logo.png" alt="">
    <p class="text-2xl sm:text-3xl font-semibold">GitHub Issues Tracker</p>
  </div>
  <div class="flex gap-5 ">

   <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search issues..." />
</label>
    <button class="btn btn-primary hover:bg-success">+ New Issue</button>
  </div>
</div>
</div>

<!-- menu -->
<div class="bg-white mt-5 w-10/12 mx-auto rounded-lg flex justify-center sm:justify-start p-2">
     <ul class="menu menu-horizontal space-x-2  ">
  <li><button onclick="toggle_btn(all_btn, 'all')" id="all_btn" class="btn">All</button></li>
  <li><button onclick="toggle_btn(open_btn, 'open')" id="open_btn" class="btn">Open</button></li>
  <li><button onclick="toggle_btn(closed_btn, 'closed')" id="closed_btn" class="btn">Closed</button></li>
</ul>
</div>

<!-- issues show -->
<div class="main flex justify-center sm:justify-between w-10/12 mx-auto mt-10 bg-white rounded-lg p-4 flex-wrap space-y-3">

  <div class="flex justify-between gap-5 items-center">
  <div class="bg-[#ECE4FF] rounded-full p-2">
    <img src="./assets/Aperture.png" alt="">
  </div>

  <div>
    <p class="font-semibold text-xl"><span id="count_issues">0</span> Issues</p>
    <p class="text-[#64748B]">Track and manage your project issues</p>
  </div>
  </div>

  <div class="flex justify-between gap-5">

   <div class="flex items-center gap-2">

    <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
    <p class="text-gray-700">Open</p>

   </div>
   <!-- 2nd -->
   <div class="flex items-center gap-2">

    <div class="w-3 h-3 rounded-full bg-[#9333EA]"></div>
    <p class="text-gray-700">Closed</p>

   </div>

  </div>

</div>
<!-- loading  -->
<div id="loading_spinner" class="hidden flex justify-center my-10">
  <span class="loading loading-spinner loading-xl"></span>

</div>


<!-- all cart -->
<div id="cart_container" class="p-2 my-5 grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-4 gap-2 w-10/12 mx-auto">
